services:
  - type: web
    name: finance-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: finance-tracker-db
          property: connectionString
      - key: ALLOWED_ORIGINS
        sync: false   # set manually after Vercel deploy gives you the URL
      - key: DEBUG
        value: false

databases:
  - name: finance-tracker-db
    plan: free
