services:
  - type: web
    name: finance-tracker-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        sync: false   # paste your Supabase connection string here
      - key: ALLOWED_ORIGINS
        sync: false   # paste your Vercel URL here after deploying frontend
      - key: DEBUG
        value: false
